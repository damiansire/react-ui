name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # vitest bundles a nested rollup whose platform-specific optional dep
        # (@rollup/rollup-linux-x64-gnu) npm fails to install from the lockfile
        # (npm/cli#4828). Dropping the lockfile forces a fresh, platform-correct
        # resolution — the exact workaround the error message recommends.
        run: |
          rm -f package-lock.json
          npm install

      # Build primero: los type-tests, la resolución del .d.ts y el presupuesto
      # de bundle leen dist/.
      - name: Build library
        run: npm run -w react-dynamic-tables rollup-build-lib

      - name: Typecheck
        run: npm run -w react-dynamic-tables typecheck

      # Suite completa: unit + componente + a11y + type-tests + resolución .d.ts
      # + presupuesto de bundle.
      - name: Test
        run: npm test

      # Compila Storybook con el addon de a11y habilitado (gate de a11y).
      - name: Build Storybook (a11y addon)
        run: npm run -w react-dynamic-tables build-storybook
